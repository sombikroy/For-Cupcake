<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Only For You 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.9);
    padding: 50px;
    border-radius: 25px;
    max-width: 500px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

h1 {
    font-family: 'Playfair Display', serif;
    color: #b76e79;
}

p {
    font-size: 18px;
    line-height: 1.6;
    color: #444;
}
</style>
</head>

<body>

<div class="card">
    <h1>You Found It 🤍</h1>
    <p>
        If you're reading this,
        it means you looked a little deeper.

        And that’s what I love about you.

        There will always be more layers,
        more memories,
        more love waiting for you.

        This little hidden corner?
        It’s just for you.

        — Forever yours 🤍
    </p>
</div>

</body>
</html>
