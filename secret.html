<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just For You 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.95);
    padding: 50px;
    border-radius: 25px;
    max-width: 500px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

h1 {
    font-family: 'Playfair Display', serif;
    color: #b76e79;
}

p {
    font-size: 18px;
    line-height: 1.6;
    color: #444;
}
</style>
</head>

<body>

<div class="card">
    <h1 id="title"></h1>
    <p id="message"></p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const person = params.get("person");

const title = document.getElementById("title");
const message = document.getElementById("message");

if (person === "bubsss") {
    title.innerText = "For Bubsss 🤍";
    message.innerText = `
You’re the steady one.
The calm strength.
The one who holds everything together.

Even when things get messy,
you don’t run.
And that’s something rare.

I see you.
I appreciate you.
I choose you.
`;
} 
else if (person === "cupcake") {
    title.innerText = "For Cupcake 🤍";
    message.innerText = `
You are softness in human form.

Even when you're angry,
even when you're quiet,
you still mean the world to me.

There’s something about you
that makes life lighter.

And I wouldn’t trade that for anything.
`;
} 
else {
    title.innerText = "Secret 🤍";
    message.innerText = "This page is meant for someone special.";
}
</script>

</body>
</html>
